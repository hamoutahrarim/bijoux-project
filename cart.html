<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="site-nav" role="banner">
  <div class="nav-left">
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html#products">Collection</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
  </div>
  <a href="index.html" class="logo" aria-label="Seira — Accueil">Seira</a>
  <div class="nav-right">
    <a href="#" class="nav-icon-btn login-inline" id="login-link" aria-label="Mon compte" title="Connexion">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 20v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="favorites.html" class="nav-icon-btn" aria-label="Favoris" title="Favoris">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <a href="cart.html" class="nav-icon-btn" aria-label="Panier" title="Panier">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 6h15l-1.5 9h-11L6 6z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6 6L4 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="10" cy="20" r="1" fill="currentColor"/>
        <circle cx="18" cy="20" r="1" fill="currentColor"/>
      </svg>
    </a>
  </div>
</header>
<!-- Dropdown mobile -->
<nav class="nav-dropdown" id="nav-dropdown" aria-label="Menu principal">
  <a href="index.html#products">Collection</a>
  <a href="shop.html">Shop</a>
  <a href="about.html">About</a>
  <a href="#" id="login-link-mobile">Connexion</a>
</nav>


<!-- PAGE HEADER -->
<header class="page-header">
  <h1>Votre panier</h1>
</header>

<main class="cart-container" aria-label="Panier">
  <div id="cart-items"></div>
  <p id="total" class="cart-total" aria-live="polite"></p>
  <div class="cart-actions">
    <a href="shop.html" class="btn">Continuer mes achats</a>
    <button class="checkout-btn" id="checkout-btn">Passer à la caisse</button>
  </div>
</main>

<script src="script.js"></script>
<script>
  document.getElementById('checkout-btn').addEventListener('click', () => {
    if (!cart || cart.length === 0) {
      showToast('Votre panier est vide !');
    } else {
      window.location.href = 'checkout.html';
    }
  });
</script>
</body>
</html>
